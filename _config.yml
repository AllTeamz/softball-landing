# Encoding and Core Settings
encoding: UTF-8
strict_front_matter: true

# Jekyll Configuration
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-minifier

# Analytics and Performance Configuration
google_analytics: G-BNPLMS274F
google_analytics_options:
  siteSpeedSampleRate: 100
  anonymizeIp: true
  cookieDomain: auto

# Site Settings
page_title: "Softball Bound - College Softball Recruiting Assistant App | Find Your Perfect Program"
title: "Softball Bound - College Softball Recruiting Assistant App | Find Your Perfect Program"
description: "Softball Bound helps athletes own their college softball recruiting process with real-time access to over 1,200 NCAA, NAIA, and JUCO programs. Get coach contacts, program stats, and recruiting deadlines all in one place."
keywords: "college softball recruiting, softball recruiting app, NCAA softball programs, NAIA softball, JUCO softball, college softball coaches, athletic recruiting"
tagline: "Streamline Your College Softball Recruiting Journey"
site_name: "Softball Bound"
author: AllTeamz

# App Info
ios_app_id: 1222443580
ios_app_country: us
app_icon: /assets/sbicon.jpeg
app_name: Softball Bound
app_price: ""
app_description: "1,200+ College Programs. One App. Your Recruiting Edge."
enable_smart_app_banner: true

# Social Media and Contact
your_name: AllTeamz
your_link: https://allteamz.com
your_city: Los Angeles
email_address: ryan@allteamz.com
facebook_username: allteamz
instagram_username: allteamz
twitter_username: allteamz
github_username:
youtube_username:
logo: /assets/sbicon.jpeg
image: assets/sbicon.jpeg

# Social Media Meta
og_type: website
og_image: assets/sbicon.jpeg
og_site_name: "Softball Bound"
twitter_card: summary_large_image
twitter_creator: "@allteamz"
twitter_site: "@allteamz"

# Redirect Configuration
defaults:
  - scope:
      path: "assets/screenshot"
    values:
      screenshot: true
  - scope:
      path: ""
    values:
      layout: "default"
      redirect_from:
        - /app
        - /ios
        - /download
        - /install
        - /softball
        - /recruiting
        - /college-softball
        - /ncaa
        - /naia
        - /juco
        - /softballbound
        - /softball-bound
        - /softball_bound
        - /softballapp
        - /softball-app
        - /recruit
        - /recruiting-app
        - /college
        - /coaches

# Asset Paths
screenshot_path: "assets/yellow_ss.svg"
assets_path: "assets"

# Asset Caching and Processing
assets:
  compress:
    css: true
    js: true
  cache: true
  cdn: false
  skip_baseurl_with_cdn: false
  skip_prefix_with_cdn: false
  prefix: "/assets"
  digest: true
  source_maps: false
  destination: "/assets"
  compression: true
  gzip: false

# Performance Settings
compress_html:
  clippings: all
  comments: ["<!-- ", " -->"]
  endings: all
  ignore:
    envs: [development]
  blanklines: false
  profile: false
  startings: [html, head, body]

jekyll-minifier:
  exclude: ['*.xml']
  uglifier_args:
    harmony: true
  compress_css: true
  compress_javascript: true
  js_compressor: uglifier
  css_compressor: sass
  html_compressor: zlib

# Build Settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

# SASS Configuration
sass:
  style: compressed
  implementation: sass-embedded
  sass_dir: _sass
  load_paths:
    - _sass
    - node_modules

# Encoding and Processing
encoding: UTF-8
strict_front_matter: true
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

# Exclude files from build
exclude:
  - LICENSE
  - README.md
  - CNAME
  - vendor
  - vendor/bundle
  - vendor/cache
  - vendor/gems
  - vendor/ruby
  - node_modules
  - tmp
  - .sass-cache
  - .jekyll-cache
  - .git

# Theme Settings
topbar_color: "#000000"
topbar_transparency: 0.05
topbar_title_color: "#ffffff"

cover_image: /assets/95AE1950-A7F2-470E-BFD7-FDCD561D0E9D.png
cover_overlay_color: "#1a2332"
cover_overlay_transparency: 0.7

device_color: /assets/black.png
body_background_color: "#ffffff"

screenshot_path: /assets/yellow_ss.svg

link_color: "#1d63ea"

app_title_color: "#ffffff"
app_price_color: "rgba(255, 255, 255, 0.9)"
app_description_color: "rgba(255, 255, 255, 0.95)"

feature_title_color: "#1a1a1a"
feature_text_color: "#555555"

feature_icons_foreground_color: "#1d63ea"
feature_icons_background_color: "transparent"

social_icons_foreground_color: "#555555"
social_icons_background_color: "transparent"

footer_text_color: "#555555"

# Feature List
features:
  - title: Every Program at Your Fingertips
    description: Instantly access 1,200+ NCAA, NAIA, and JUCO softball programs with comprehensive stats, academic info, and program details.
    fontawesome_icon_name: school

  - title: Message Coaches Directly
    description: Get verified phone numbers, emails, and social links for coaching staff. No gatekeepers, no guessing — just direct connections.
    fontawesome_icon_name: phone

  - title: Find Your Fit in Seconds
    description: Filter by state, division, conference, or academic requirements. Stop scrolling through schools that don't match your goals.
    fontawesome_icon_name: sort

  - title: Know If Your GPA Makes the Cut
    description: See graduation rates, academic requirements, and student retention before you waste time on schools that aren't realistic.
    fontawesome_icon_name: graduation-cap

  - title: Never Miss a Coaching Change
    description: Get real-time updates when programs hire new coaches or change recruiting priorities.
    fontawesome_icon_name: marker

  - title: Deadline Reminders That Save You
    description: NCAA and NAIA recruiting windows close fast. Smart alerts ensure you never miss your shot.
    fontawesome_icon_name: bell

# Collections
collections:
  pages:
    output: true
    permalink: /:path/

# Jekyll Feed Configuration
feed:
  path: feed.xml
  posts_limit: 20
  excerpt_only: true

# Jekyll SEO Tag Configuration
social:
  name: Softball Bound
  links:
    - https://twitter.com/allteamz
    - https://www.facebook.com/allteamz
    - https://www.instagram.com/allteamz

# Additional SEO Settings
lang: en_US
locale: en_US
url: "https://allteamz.com"
baseurl: ""
