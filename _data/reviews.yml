- title: "A MUST HAVE !"
  content: "My daughter is a 2024, and committed to an SEC school to play softball in September. The recruiting journey was not too stressful, and one of the main reasons was this app !! This app is so helpful, especially if you are on the go as most softball parents are. With the help of this app, my family and I were able to make a email list of target schools. Thank you for the time put in!!"
  author: "Twralph83"
  date: 2023-02-04

- title: "Easy to use & very accurate"
  content: "Excellent info at a tough of a button. Very helpful at Showcase events to access teams conference and cost of education at the school. This app never crashes and coaches info and links are always current. I'm a travel coach and college recruiter. The highly accurate info has really helped me know the name and school info of the college coach I find myself talking to. My preferred Softball App."
  author: "Aurelius64"
  date: 2018-09-07

- title: "Must Have for the recruiting process!"
  content: "This app has been amazing!! You get everything right here.... from a coach's email or phone number, to the average ACT score of their students. It helps choose the right place because it gives so much information including the average salary of their graduating seniors. It's definitely worth every single penny!"
  author: "Jayhawk Mama"
  date: 2019-01-22

- title: "Great app! College help at your finger tips!"
  content: "Easy to use app with lots of useful information for anyone looking at playing in college and researching schools of interest. Highly recommend it and have used it for information for both my daughters going on to play at a collegiate level!"
  author: "Okieborn"
  date: 2023-02-01
